<!DOCTYPE html>
<html>
<head>
    <title>Post Form</title>
</head>
<body>
    <h1>Create / Edit Post</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>

    <p><a href="{% url 'post-list' %}">Back to Posts</a></p>
</body>
</html>
